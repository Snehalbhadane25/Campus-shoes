<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stores | Campus Shoes</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="bg-dark text-white py-3 text-center">
      <h2>Our Stores 🏬</h2>
    </header>

    <section class="py-5">
      <div class="container text-center">
        <h4 class="fw-bold mb-4">Find a Campus Store Near You</h4>
        <p class="lead">We have stores in major cities across India.</p>

        <div class="row g-4 mt-4">
          <div class="col-md-4">
            <div class="card p-3 shadow-sm">
              <h5>Mumbai</h5>
              <p>High Street Phoenix, Lower Parel</p>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card p-3 shadow-sm">
              <h5>Pune</h5>
              <p>Seasons Mall, Magarpatta City</p>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card p-3 shadow-sm">
              <h5>Delhi</h5>
              <p>DLF Mall of India, Noida</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="bg-dark text-white text-center py-3">
      <p class="mb-0">&copy; 2025 Campus Shoes | All Rights Reserved</p>
    </footer>
  </body>
</html>
