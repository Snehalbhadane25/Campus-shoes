<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Shoes | Collection</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ====== HEADER ====== -->
    <header>
      <div class="top-nav py-2 bg-white shadow-sm">
        <div
          class="container d-flex justify-content-between align-items-center"
        >
          <div class="d-flex align-items-center gap-2">
            <i class="fas fa-search text-dark"></i>
            <input
              type="text"
              class="form-control border-0 shadow-none search-input"
              placeholder="Search"
            />
          </div>

          <div class="text-center">
            <a href="index.html" class="navbar-brand d-flex align-items-center">
              <img
                src="img/logo.png"
                alt="Campus"
                width="50"
                height="50"
                class="me-2"
              />
              <h2 class="m-0 fw-bold text-dark">CAMPUS</h2>
            </a>
          </div>

          <div class="d-flex align-items-center gap-3">
            <a href="wishlist.html" class="text-dark text-decoration-none">
              <i class="fa-regular fa-heart me-1"></i> Wishlist
            </a>
            <a href="cart.html" class="text-dark text-decoration-none">
              <i class="fa-solid fa-cart-shopping me-1"></i> Cart
            </a>
            <a href="stores.html" class="text-dark text-decoration-none">
              <i class="fa-solid fa-store me-1"></i> Stores
            </a>
            <a href="track.html" class="text-dark text-decoration-none">
              <i class="fa-solid fa-map-marker-alt me-1"></i> Track Order
            </a>
          </div>
        </div>
      </div>

      <nav class="main-nav bg-black py-2">
        <div class="container d-flex justify-content-center">
          <ul class="nav">
            <li class="nav-item">
              <a class="nav-link text-white" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link active fw-semibold text-warning"
                href="collection.html"
                >Collections</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="faq.html">FAQs</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <!-- ====== COLLECTION ====== -->
    <section class="py-5 bg-light text-center">
      <div class="container">
        <h2 class="fw-bold mb-4">Our Collection</h2>
        <div class="row g-4" id="product-list"></div>
      </div>
    </section>

    <!-- ====== FOOTER ====== -->
    <footer class="bg-dark text-white text-center py-3">
      <p class="mb-0">&copy; 2025 Campus Shoes | All Rights Reserved</p>
    </footer>

    <script>
      const products = [
        { name: "Campus Runner", price: 1499, img: "img/men1.jpg" },
        { name: "Campus Street", price: 1299, img: "img/men2.jpg" },
        { name: "Campus Sport", price: 1799, img: "img/women1.jpg" },
        { name: "Campus Comfort", price: 1599, img: "img/women2.jpg" },
        { name: "Campus Power", price: 1899, img: "img/sports1.jpg" },
        { name: "Campus Speed", price: 1999, img: "img/sports2.jpg" },
        { name: "Campus Bold", price: 1499, img: "img/men3.jpg" },
        { name: "Campus Breeze", price: 1599, img: "img/women3.jpg" },
        { name: "Campus Stride", price: 2099, img: "img/sports3.jpg" },
      ];

      const list = document.getElementById("product-list");
      products.forEach((p) => {
        list.innerHTML += `
        <div class="col-md-4">
          <div class="card shadow-sm product-card">
            <img src="${p.img}" class="card-img-top" alt="${p.name}">
            <div class="card-body">
              <h5>${p.name}</h5>
              <p>₹${p.price}</p>
              <a href="product-details.html?name=${encodeURIComponent(
                p.name
              )}&price=${p.price}&img=${p.img}" class="btn btn-dark">Buy Now</a>
            </div>
          </div>
        </div>`;
      });
    </script>
  </body>
</html>
