<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details | Campus Shoes</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #f8f9fa;
        font-family: "Poppins", sans-serif;
      }
      .product-container {
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .product-img {
        border-radius: 15px 0 0 15px;
        width: 100%;
        object-fit: cover;
      }
      .product-info {
        padding: 30px;
        text-align: left;
      }
      .product-info h2 {
        font-weight: 700;
      }
      .price {
        color: #198754;
        font-size: 1.5rem;
        font-weight: bold;
      }
      .btn-custom {
        padding: 10px 20px;
        border-radius: 30px;
        font-weight: 600;
      }
      .btn-dark:hover {
        background-color: #222;
      }
      .back-btn {
        background: #ffc107;
        border: none;
        color: #000;
        font-weight: bold;
        border-radius: 25px;
        padding: 10px 25px;
      }
      .back-btn:hover {
        background: #e0a800;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="product-container row align-items-center">
        <div class="col-md-6 p-0">
          <img id="product-img" class="product-img" alt="Shoe Image" />
        </div>
        <div class="col-md-6 product-info">
          <h2 id="product-name"></h2>
          <p id="product-price" class="price"></p>
          <p class="text-muted">
            Experience the latest comfort and performance with Campus footwear.
            Designed for style, durability, and confidence.
          </p>

          <div class="mt-4">
            <button class="btn btn-dark btn-custom me-2" onclick="addToCart()">
              <i class="fa-solid fa-cart-plus me-1"></i> Add to Cart
            </button>
            <button
              class="btn btn-outline-danger btn-custom me-2"
              onclick="addToWishlist()"
            >
              <i class="fa-regular fa-heart me-1"></i> Add to Wishlist
            </button>
            <a href="collection.html" class="btn back-btn">
              <i class="fa-solid fa-arrow-left me-2"></i> Back to Collection
            </a>
          </div>
        </div>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name");
      const price = params.get("price");
      const img = params.get("img");

      document.getElementById("product-name").textContent = name;
      document.getElementById("product-price").textContent = "₹" + price;
      document.getElementById("product-img").src = img;

      function addToCart() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push({ name, price, img });
        localStorage.setItem("cart", JSON.stringify(cart));
        alert(`${name} added to cart!`);
      }

      function addToWishlist() {
        let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
        wishlist.push({ name, price, img });
        localStorage.setItem("wishlist", JSON.stringify(wishlist));
        alert(`${name} added to wishlist!`);
      }
    </script>
  </body>
</html>
