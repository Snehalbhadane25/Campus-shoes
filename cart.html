<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
      <div class="container">
        <a class="navbar-brand" href="index.html"><span>ShoeStore</span></a>
        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
              <a href="collection.html" class="nav-link">Collection</a>
            </li>
            <li class="nav-item">
              <a href="wishlist.html" class="nav-link">Wishlist</a>
            </li>
            <li class="nav-item">
              <a href="cart.html" class="nav-link active">Cart</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <h2 class="text-center mb-4">Your Cart 🛒</h2>
      <div id="cart-container" class="table-responsive"></div>
      <div class="text-center mt-4">
        <a href="collection.html" class="btn-return">← Back to Collection</a>
      </div>
    </div>

    <footer class="py-3 text-center">
      <p>© 2025 ShoeStore. All Rights Reserved.</p>
    </footer>

    <script>
      const cartContainer = document.getElementById("cart-container");
      let cart = JSON.parse(localStorage.getItem("cart")) || [];

      function renderCart() {
        if (cart.length === 0) {
          cartContainer.innerHTML =
            "<p class='text-center'>Your cart is empty 🛍️</p>";
          return;
        }

        let total = cart.reduce((sum, item) => sum + parseFloat(item.price), 0);

        cartContainer.innerHTML = `
        <table class="table align-middle table-bordered text-center">
          <thead class="table-dark">
            <tr>
              <th>Image</th>
              <th>Product</th>
              <th>Price</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${cart
              .map(
                (item, i) => `
              <tr>
                <td><img src="${item.image}" alt="${item.name}" /></td>
                <td>${item.name}</td>
                <td>₹${item.price}</td>
                <td>
                  <button class="btn-remove" onclick="removeFromCart(${i})">Remove</button>
                </td>
              </tr>
            `
              )
              .join("")}
          </tbody>
        </table>
        <h4 class="text-end mt-3">Total: ₹${total.toFixed(2)}</h4>
        <div class="text-end mt-3">
          <button class="btn-dark">Proceed to Buy</button>
        </div>
      `;
      }

      function removeFromCart(index) {
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
      }

      renderCart();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
