<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Order | Campus Shoes</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="bg-dark text-white py-3 text-center">
      <h2>Track Your Order 📦</h2>
    </header>

    <section class="py-5">
      <div class="container text-center">
        <p class="lead mb-4">
          Enter your order ID to check your delivery status.
        </p>
        <form class="d-flex justify-content-center">
          <input
            type="text"
            class="form-control w-50 me-2"
            placeholder="Enter Order ID"
          />
          <button type="submit" class="btn btn-shop">Track</button>
        </form>
      </div>
    </section>

    <footer class="bg-dark text-white text-center py-3">
      <p class="mb-0">&copy; 2025 Campus Shoes | All Rights Reserved</p>
    </footer>
  </body>
</html>
